{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>{% block title %} placement cell {% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    {% block extra_css %} {% endblock %}
  </head>
  <body class="layout-template">
    
    <!-- Top Navbar -->
    <nav>
      <div class="navbar-content">
        <h2 style="color: white; font-size:25px;"><img src="{% static 'ITM-University-Logo.png' %}" alt="ITM University Logo" style="height:60px;"></h2>
        <!-- You can add nav links/buttons here if needed -->
      </div>
    </nav>

    <!-- Sidebar -->
    <aside>
      <div class="sidebar-content">
        <details open>
          <summary>
            <h2 style= "font-size: 25px">Admin Panel <span class="fa arrow"></span></h2>
          </summary>
          <ul>
            <li>
              <a href="{% url 'student_list' %}"><i class="bi bi-file-person"></i> Student</a>
            </li>
            <li>
              <a href="{% url 'bus_list' %}"><i class="bi bi-bus-front-fill"></i> Buses</a>
            </li>
            <li>
              <a href="{% url 'allotment_list' %}"><i class="bi bi-briefcase-fill"></i> Allotment</a>
            </li>
            <li>
              <a href="{% url 'driver_list' %}"><i class="bi bi-list-columns-reverse"></i> Drivers</a>
            </li>
            <li>
              <a href="{% url 'route_list' %}"><i class="bi bi-sign-turn-slight-right-fill"></i> Routes</a>
            </li>
            <li>
              <a href="{% url 'stoppage_list' %}"><i class="bi bi-sign-stop-lights-fill"></i> Stoppages</a>
            </li>
            <li>
              <a href="{% url 'notice_list' %}"><i class="bi bi-bell-fill"></i> Notices</a>
            </li>
            <li>
              <a href="#"><i class="bi bi-bell"></i> Reports</a>
            </li>
          </ul>
        </details>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="my-container">
      {% block content %} {% endblock %}
    </div>

    <!-- JS for Sidebar behavior -->
    <script>
      document.querySelectorAll("aside details a").forEach((link) => {
        link.addEventListener("click", function () {
          const details = this.closest('details');
          setTimeout(() => {
            if (details) {
              details.open = true;
            }
          }, 0);
        });
      });
    </script>
  </body>
</html>
